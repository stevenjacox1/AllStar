<div class="min-h-screen bg-gray-950 text-white">
  <header class="bg-red-800 shadow-xl px-6 py-4 flex items-center justify-between">
    <h1 class="text-2xl font-black uppercase tracking-tight">Admin</h1>
    <button
      (click)="logout()"
      class="text-sm font-medium bg-gray-900/50 hover:bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 transition-colors"
    >
      Log Out
    </button>
  </header>

  <div class="bg-gray-900 border-b border-gray-800 sticky top-0 z-10">
    <nav class="max-w-5xl mx-auto flex" aria-label="Admin sections">
      <a routerLink="/admin/events"
        class="px-6 py-4 font-semibold border-b-2 border-gray-700 text-gray-400 transition hover:text-white">
        Events
      </a>
      <a routerLink="/admin/gallery"
        class="px-6 py-4 font-semibold border-b-2 border-gray-700 text-gray-400 transition hover:text-white">
        Gallery Content
      </a>
      <a routerLink="/admin/menu"
        class="px-6 py-4 font-semibold border-b-2 border-gray-700 text-gray-400 transition hover:text-white">
        Menu
      </a>
      <a routerLink="/admin/site-content"
        aria-current="page"
        class="px-6 py-4 font-semibold border-b-2 border-red-600 text-white transition hover:text-white">
        Site Content
      </a>
    </nav>
  </div>

  <main class="max-w-5xl mx-auto px-6 py-12">
    <h2 class="text-3xl font-bold text-yellow-400 mb-8">Site Content</h2>

    <div class="rounded-xl border border-gray-700 bg-gray-900/80 p-8">
      <label class="block text-sm font-semibold uppercase tracking-[0.25em] text-yellow-400 mb-3">
        Hero Tagline
      </label>
      <p class="text-sm text-gray-400 mb-4">
        This text appears in the large banner at the top of the home page.
      </p>

      <textarea
        [(ngModel)]="heroText"
        name="heroText"
        rows="4"
        class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-red-500 resize-y text-lg"
        placeholder="Enter your hero tagline..."
      ></textarea>

      <!-- Live preview -->
      <div class="mt-4 rounded-lg border border-gray-700 bg-gray-950 px-6 py-5">
        <p class="text-xs uppercase tracking-widest text-gray-500 mb-2">Preview</p>
        <p class="text-2xl font-black text-red-600 tracking-tight">{{ heroText }}</p>
      </div>

      <div class="mt-6 flex items-center gap-4">
        <button
          type="button"
          (click)="save()"
          [disabled]="saving() || !heroText.trim()"
          class="bg-red-700 hover:bg-red-600 disabled:opacity-50 text-white font-bold px-6 py-2.5 rounded-lg transition-colors"
        >
          {{ saving() ? 'Saving…' : 'Save' }}
        </button>

        @if (saveStatus() === 'success') {
          <span class="text-green-400 text-sm font-medium">✓ Saved successfully</span>
        }
        @if (saveStatus() === 'error') {
          <span class="text-red-400 text-sm font-medium">Failed to save. Please try again.</span>
        }
      </div>
    </div>
  </main>
</div>
