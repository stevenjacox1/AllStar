<div class="gallery-editor px-6 py-8">
  <h2 class="text-3xl font-bold text-white mb-6">Gallery Content Editor</h2>

  <!-- Day Selector Tabs -->
  <div class="mb-6">
    <p class="text-gray-300 text-sm mb-3">Select Day:</p>
    <div class="flex flex-wrap gap-2">
      @for (day of days; track day) {
        <button
          (click)="selectDay(day)"
          [class.bg-red-600]="selectedDay() === day"
          [class.bg-gray-700]="selectedDay() !== day"
          class="px-4 py-2 rounded text-white capitalize font-semibold transition hover:bg-red-700"
        >
          {{ day }}
        </button>
      }
    </div>
  </div>

  <!-- Error Alert -->
  @if (error()) {
    <div class="mb-4 p-4 bg-red-900 border border-red-700 text-red-100 rounded">
      {{ error() }}
    </div>
  }

  <!-- Success Alert -->
  @if (saveSuccess()) {
    <div class="mb-4 p-4 bg-green-900 border border-green-700 text-green-100 rounded">
      Content saved successfully!
    </div>
  }

  <!-- Loading State -->
  @if (loading()) {
    <div class="text-center py-8">
      <p class="text-gray-400">Loading content...</p>
    </div>
  } @else {
    <!-- Editor Section -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- HTML Editor -->
      <div>
        <h3 class="text-xl font-semibold text-white mb-3">HTML Editor</h3>

        <div class="mb-4">
          <label for="slide-caption" class="block text-gray-300 text-sm mb-2">Slide Caption</label>
          <input
            id="slide-caption"
            type="text"
            [ngModel]="caption()"
            (ngModelChange)="caption.set($event)"
            class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded text-white text-sm focus:outline-none focus:border-red-600"
            placeholder="Enter slide caption..."
          />
        </div>

        <!-- Toolbar -->
        <div class="mb-3 flex flex-wrap gap-2 bg-gray-800 p-3 rounded border border-gray-700">
          <button
            (click)="wrapStrong()"
            title="Insert <strong> tag"
            class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-white rounded text-sm font-semibold"
          >
            &lt;strong&gt;
          </button>
          <button
            (click)="wrapEmphasis()"
            title="Insert <em> tag"
            class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-white rounded text-sm"
          >
            &lt;em&gt;
          </button>
          <div class="border-r border-gray-600"></div>
          <button
            (click)="addHeading()"
            title="Insert <h2> tag"
            class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-white rounded text-sm font-semibold"
          >
            &lt;h2&gt;
          </button>
          <button
            (click)="addParagraph()"
            title="Insert <p> tag"
            class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-white rounded text-sm"
          >
            &lt;p&gt;
          </button>
          <button
            (click)="addLink()"
            title="Insert <a> tag"
            class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-white rounded text-sm"
          >
            &lt;a&gt;
          </button>
        </div>

        <!-- Editor Textarea -->
        <textarea
          [ngModel]="html()"
          (ngModelChange)="html.set($event)"
          class="w-full h-96 p-4 bg-gray-900 border border-gray-700 rounded text-white font-mono text-sm resize-none focus:outline-none focus:border-red-600"
          placeholder="Enter HTML content here..."
        ></textarea>

        <!-- Action Buttons -->
        <div class="mt-4 flex gap-3">
          <button
            (click)="saveContent()"
            [disabled]="isSaving()"
            class="px-6 py-2 bg-red-600 hover:bg-red-700 disabled:bg-gray-600 text-white font-semibold rounded transition"
          >
            {{ isSaving() ? 'Saving...' : 'Save Content' }}
          </button>
          <button
            (click)="clearContent()"
            [disabled]="isSaving() || !html()"
            class="px-6 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 text-white font-semibold rounded transition"
          >
            Clear
          </button>
        </div>
      </div>

      <!-- Live Preview -->
      <div>
        <h3 class="text-xl font-semibold text-white mb-3">Live Preview</h3>
        <div
          class="w-full h-96 p-4 bg-gray-900 border border-gray-700 rounded text-gray-100 overflow-y-auto [&_p]:mb-3 [&_p]:leading-relaxed [&_strong]:text-white [&_strong]:font-bold [&_em]:text-gray-300 [&_h2]:text-xl [&_h2]:font-bold [&_h2]:mt-4 [&_h2]:mb-2 [&_h2]:text-red-400 [&_ul]:ml-4 [&_li]:mb-2 [&_a]:text-blue-400 [&_a]:underline [&_a]:hover:text-blue-300"
          [innerHTML]="htmlPreview()"
        ></div>
      </div>
    </div>
  }
</div>
