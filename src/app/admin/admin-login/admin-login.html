<div class="min-h-screen bg-gray-950 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-black text-red-600 uppercase tracking-tight">All-Star Sports Bar</h1>
      <p class="mt-2 text-gray-400">Admin Portal</p>
    </div>

    <form (ngSubmit)="submit()" class="bg-gray-900 rounded-2xl border border-gray-700 p-8 shadow-2xl">
      <h2 class="text-2xl font-bold text-white mb-6">Sign In</h2>

      @if (errorMessage()) {
        <div class="mb-4 rounded-lg bg-red-900/50 border border-red-700 px-4 py-3 text-red-300 text-sm">
          {{ errorMessage() }}
        </div>
      }

      <div class="mb-5">
        <label for="username" class="block text-sm font-medium text-gray-300 mb-1">Username</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          required
          autocomplete="username"
          class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-red-500"
          placeholder="admin"
        />
      </div>

      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
          class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-red-500"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-red-700 hover:bg-red-600 text-white font-bold py-3 rounded-lg transition-colors"
      >
        Sign In
      </button>
    </form>
  </div>
</div>
