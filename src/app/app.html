<!-- app.component.html -->
<header class="fixed top-0 left-0 z-50 w-full h-[10vh] bg-red-800 shadow-xl">
  <div class="container mx-auto h-full px-4 flex items-center justify-between">
    <!-- Logo / Name -->
    <h1 class="text-3xl md:text-5xl font-extrabold text-white tracking-tight uppercase">
      All-Star Sports Bar
    </h1>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex items-center space-x-8 text-white font-medium">
      <a href="#" class="hover:text-yellow-300 transition-colors duration-200">Menu</a>
      <a href="#" class="hover:text-yellow-300 transition-colors duration-200">Events</a>
      <a href="#" class="hover:text-yellow-300 transition-colors duration-200">Watch Parties</a>
      <a href="#" class="hover:text-yellow-300 transition-colors duration-200">Contact</a>
    </nav>

    <!-- Mobile menu button (expand later with drawer / dialog) -->
    <button class="md:hidden text-white text-3xl focus:outline-none">
      ☰
    </button>
  </div>
</header>

<main class="pt-[10vh] min-h-screen bg-gray-950 text-white">
  <!-- Hero / Welcome section -->
  <section class="relative h-[80vh] flex items-center justify-center bg-cover bg-center bg-no-repeat"
           style="background-image: url('/AllStarLogo.jpg');">
    <!-- Dark overlay for readability -->
    <div class="absolute inset-0 bg-black/65"></div>

    <div class="relative z-10 text-center px-6 max-w-5xl">
      <h2 class="text-5xl sm:text-6xl md:text-7xl font-black text-red-600 tracking-tight drop-shadow-2xl">
        YOUR HOME FOR THE BIG GAME
      </h2>
      <p class="mt-6 text-xl sm:text-2xl md:text-3xl text-gray-200 font-medium">
        Cold Beer • Killer Food • Every Screen Live Action
      </p>
      <button class="mt-10 px-10 py-5 bg-red-700 hover:bg-red-600 text-white text-xl md:text-2xl font-bold rounded-full shadow-2xl transition-all duration-300 transform hover:scale-105">
        Reserve a Table
      </button>
    </div>
  </section>

  <!-- Today's Specials section -->
  <section class="py-16 md:py-24 px-6 text-center bg-gradient-to-b from-gray-950 to-gray-900">
    <h3 class="text-4xl md:text-5xl font-bold mb-8 text-red-500">Today's Specials</h3>
    <p class="text-xl md:text-2xl text-gray-300 max-w-3xl mx-auto">
      Wings Night • $5 Drafts During Games • Live NFL, NBA & UFC
    </p>
    <!-- You can add cards/grid for more specials later -->
  </section>


<section class="py-16 md:py-24 px-6 bg-gray-950">
  <app-events-calendar></app-events-calendar>
</section>

  <!-- Optional: Quick call-to-action or more content -->
  <section class="py-16 px-6 text-center">
    <p class="text-lg md:text-xl text-gray-400">
      Come for the game, stay for the vibe.
    </p>
  </section>
</main>
