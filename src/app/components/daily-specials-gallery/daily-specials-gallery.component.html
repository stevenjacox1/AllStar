<div class="mx-auto max-w-6xl">
  <h3 class="text-4xl md:text-5xl font-bold mb-3 text-yellow-400 text-center">Daily Specials</h3>

  <div class="mt-8 grid grid-cols-1 gap-8">
    @for (special of daySpecials(); track special.dayKey) {
      <section class="overflow-hidden rounded-2xl border border-gray-700 bg-gray-950/80 shadow-2xl">
        <div class="relative">
          <img
            [ngSrc]="special.src"
            [alt]="special.alt"
            width="1600"
            height="900"
            class="block w-full h-auto max-h-[52vh] md:max-h-[62vh] object-contain"
            [priority]="$index === 0"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-black/75 via-black/10 to-transparent"></div>
          <div class="absolute bottom-0 left-0 right-0 p-5 md:p-7">
            <p class="text-red-400 font-semibold uppercase tracking-widest text-xs md:text-sm">{{ special.day }}</p>
            <h4 class="text-white text-2xl md:text-4xl font-black">{{ special.caption }}</h4>
          </div>
        </div>

        <div class="p-6 md:p-8">
          <div
            class="text-gray-200 text-base md:text-lg leading-relaxed [&_p]:mb-3 [&_strong]:text-white [&_ul]:list-disc [&_ul]:pl-6"
            [innerHTML]="special.detailsHtml"
          ></div>
        </div>
      </section>
    }
  </div>

  @if (extraSpecials().length > 0) {
    <section class="mt-10 rounded-2xl border border-gray-700 bg-black/50 p-6 md:p-8">
      <p class="text-xs uppercase tracking-[0.25em] text-red-400 font-semibold">Additional Specials</p>
      <div class="mt-4 grid grid-cols-1 gap-5">
        @for (special of extraSpecials(); track special.key) {
          <article class="rounded-xl border border-gray-700 bg-gray-950/80 p-5 md:p-6">
            @if (special.imageUrl) {
              <img
                [ngSrc]="special.imageUrl"
                [alt]="special.caption + ' image'"
                width="1200"
                height="675"
                class="mb-4 block w-full h-auto max-h-[40vh] rounded border border-gray-700 object-cover"
              />
            }
            <h4 class="text-xl md:text-2xl font-black text-white">{{ special.caption }}</h4>
            <div
              class="mt-3 text-gray-200 text-base leading-relaxed [&_p]:mb-3 [&_strong]:text-white [&_ul]:list-disc [&_ul]:pl-6"
              [innerHTML]="special.detailsHtml"
            ></div>
          </article>
        }
      </div>
    </section>
  }
</div>
